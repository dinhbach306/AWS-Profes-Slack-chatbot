name: AWS Study Bot Block Kit
on:
  schedule:
    - cron: '13 2,6,10 * * *' 
  workflow_dispatch:

jobs:
  generate_and_send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate and Send
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        shell: python
        run: |
          import os
          import json
          import urllib.request
          import time
          from urllib.error import HTTPError

          # 1. Configuration & Environment Check
          api_key = os.environ.get('GEMINI_API_KEY', '').strip()
          webhook_url = os.environ.get('SLACK_WEBHOOK_URL', '').strip()

          if not api_key or not webhook_url:
              print("❌ Error: GEMINI_API_KEY or SLACK_WEBHOOK_URL is missing in GitHub Secrets.")
              exit(1)

          model = "gemini-3.1-flash-lite-preview"
          url = f"https://generativelanguage.googleapis.com/v1beta/models/{model}:generateContent"
          
          # 2. Prompt cập nhật: Yêu cầu đáp án Tiếng Việt và xuống dòng rõ ràng
          prompt = """You are an expert AWS technical trainer. Generate 1 highly complex, scenario-based multiple-choice question in English for the AWS Certified Solutions Architect - Professional exam. 
          Return ONLY a valid JSON object with EXACTLY two keys: "question_blocks" and "answer_blocks". Do not include markdown formatting like ```json.
          
          Structure for "question_blocks" (Slack Block Kit array):
          1. header: "AWS Professional Practice Question"
          2. section: The detailed scenario (must be in English)
          3. section: The options (A, B, C, D) (must be in English)
          
          Structure for "answer_blocks" (Slack Block Kit array):
          1. divider
          2. section: The correct answer and a detailed explanation. 
             CRITICAL REQUIREMENT: This section MUST BE WRITTEN IN VIETNAMESE (Tiếng Việt). 
             FORMATTING REQUIREMENT: You MUST use explicit newline characters (\\n\\n) to separate the explanation of each option. Do not write a single solid paragraph. 
             Format exactly like this example:
             "*Đáp án đúng: C*\\n\\n*Giải thích chi tiết:*\\n\\n- *Tùy chọn A sai* vì...\\n\\n- *Tùy chọn B sai* vì...\\n\\n- *Tùy chọn C đúng* vì...\\n\\n- *Tùy chọn D sai* vì..."
          """

          # 3. Gọi Gemini API
          data = {"contents": [{"parts": [{"text": prompt}]}]}
          headers = {
              'Content-Type': 'application/json',
              'x-goog-api-key': api_key
          }
          
          try:
              req = urllib.request.Request(url, data=json.dumps(data).encode('utf-8'), headers=headers)
              with urllib.request.urlopen(req) as response:
                  res_data = json.loads(response.read().decode())
                  
                  raw_text = res_data['candidates'][0]['content']['parts'][0]['text']
                  clean_json = raw_text.strip().replace('```json', '').replace('```', '').strip()
                  parsed_ai_data = json.loads(clean_json)
                  
                  question_blocks = parsed_ai_data.get("question_blocks", [])
                  answer_blocks = parsed_ai_data.get("answer_blocks", [])
                  
          except Exception as e:
              print(f"❌ Data processing error: {str(e)}")
              if 'raw_text' in locals(): print(f"Raw AI Output: {raw_text}") 
              exit(1)

          # 4. Thêm Tag @channel vào danh sách block câu hỏi
          mention_block = {
              "type": "section",
              "text": {
                  "type": "mrkdwn",
                  "text": "<!channel> 🚨 *Câu hỏi ôn thi AWS mới!* Các bạn có 10 phút để đọc scenario và chọn đáp án trước khi bot gửi kết quả nhé:"
              }
          }
          question_blocks.insert(0, mention_block)

          # 5. Hàm gửi dữ liệu sang Slack
          def send_to_slack(blocks):
              slack_data = {"blocks": blocks}
              req = urllib.request.Request(webhook_url, data=json.dumps(slack_data).encode('utf-8'), headers={'Content-Type': 'application/json'})
              urllib.request.urlopen(req)

          # 6. Kịch bản Gửi -> Chờ 10p -> Gửi đáp án
          try:
              print("Đang gửi câu hỏi lên Slack...")
              send_to_slack(question_blocks)
              print("✅ Đã gửi câu hỏi. Bắt đầu đếm ngược 10 phút...")
              
              # Dừng script 10 phút (600 giây)
              time.sleep(600)
              
              print("Đã hết 10 phút, đang gửi đáp án...")
              send_to_slack(answer_blocks)
              print("✅ Đã gửi đáp án thành công!")
              
          except HTTPError as e:
              print(f"❌ Slack Webhook Error: HTTP {e.code} - {e.reason}")
              print(f"Details: {e.read().decode()}")
              exit(1)
          except Exception as e:
              print(f"❌ Slack sending error: {str(e)}")
              exit(1)
