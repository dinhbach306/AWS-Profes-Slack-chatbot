name: AWS Study Bot Block Kit
on:
  schedule:
    - cron: '0 2,6,10 * * *' 
  workflow_dispatch:

jobs:
  generate_and_send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate and Send
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        shell: python
        run: |
          import os
          import json
          import urllib.request

          # 1. Cấu hình
          api_key = os.environ['GEMINI_API_KEY']
          webhook_url = os.environ['SLACK_WEBHOOK_URL']
          model = "gemini-1.5-flash" # Dùng bản này để đảm bảo ổn định với API Free
          url = f"https://generativelanguage.googleapis.com/v1beta/models/{model}:generateContent?key={api_key}"

          prompt = "Bạn là chuyên gia AWS SAP-C02. Tạo 1 câu hỏi trắc nghiệm tiếng Việt về .NET/AWS. Trả về DUY NHẤT JSON chuẩn Slack Block Kit gồm: header, section scenario, section options, divider, context. Không giải thích thêm."

          # 2. Gọi Gemini API
          data = {
              "contents": [{"parts": [{"text": prompt}]}]
          }
          
          try:
              req = urllib.request.Request(url, data=json.dumps(data).encode('utf-8'), headers={'Content-Type': 'application/json'})
              with urllib.request.urlopen(req) as response:
                  res_data = json.loads(response.read().decode())
                  
                  # Trích xuất nội dung text
                  raw_text = res_data['candidates'][0]['content']['parts'][0]['text']
                  # Làm sạch chuỗi JSON từ AI
                  clean_json = raw_text.strip().replace('```json', '').replace('```', '').strip()
                  blocks = json.loads(clean_json)
                  
                  # 3. Gửi sang Slack
                  slack_data = {
                      "attachments": [{
                          "color": "#36a64f",
                          "blocks": blocks
                      }]
                  }
                  
                  slack_req = urllib.request.Request(webhook_url, data=json.dumps(slack_data).encode('utf-8'), headers={'Content-Type': 'application/json'})
                  urllib.request.urlopen(slack_req)
                  print("✅ Successfully sent quiz to Slack!")

          except Exception as e:
              print(f"❌ Error: {str(e)}")
              if 'res_data' in locals(): print(f"API Response: {res_data}")
              exit(1)
