name: AWS Study Bot Block Kit
on:
  schedule:
    - cron: '0 2,6,10 * * *' 
  workflow_dispatch:

jobs:
  generate_and_send:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Block Kit Question from Gemini
        id: gemini
        run: |
          # 1. Định nghĩa Prompt (viết trên 1 dòng để tránh lỗi xuống dòng trong curl)
          PROMPT="Hãy đóng vai chuyên gia AWS SAP-C02. Tạo 1 câu hỏi trắc nghiệm tiếng Việt. Trả về JSON duy nhất theo cấu trúc Block Kit của Slack gồm: header, section scenario, section 4 đáp án với icon, divider, và context giải thích. Chỉ trả về JSON, không kèm chữ."

          # 2. Gọi API (Sử dụng model gemini-1.5-flash để ổn định nhất trên API Free hiện tại hoặc gemini-3-flash nếu bạn đã có quyền truy cập)
          RESPONSE=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
            -H 'Content-Type: application/json' \
            -d "{
              \"contents\": [{
                \"parts\":[{\"text\": \"$PROMPT\"}]
              }]
            }")

          # 3. Trích xuất JSON blocks bằng Python (đã sửa lỗi cú pháp)
          BLOCKS=$(echo $RESPONSE | python3 -c "
import sys, json
try:
    data = json.load(sys.stdin)
    content = data['candidates'][0]['content']['parts'][0]['text']
    # Xử lý xóa bỏ markdown code block nếu AI trả về
    clean_content = content.strip().replace('```json', '').replace('```', '').strip()
    print(clean_content)
except Exception as e:
    print(f'Error parsing: {e}', file=sys.stderr)
    sys.exit(1)
")
          
          echo "SLACK_BLOCKS<<EOF" >> $GITHUB_ENV
          echo "$BLOCKS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Send to Slack
        run: |
          # Sử dụng jq để đảm bảo JSON gửi đi không bị lỗi ký tự đặc biệt
          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"attachments\": [
              {
                \"color\": \"#36a64f\",
                \"blocks\": ${{ env.SLACK_BLOCKS }}
              }
            ]
          }" \
          ${{ secrets.SLACK_WEBHOOK_URL }}
