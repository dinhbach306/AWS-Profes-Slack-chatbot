name: AWS Study Bot Block Kit
on:
  schedule:
    - cron: '0 2,6,10 * * *' 
  workflow_dispatch:

jobs:
  generate_and_send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate and Send
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        shell: python
        run: |
          import os
          import json
          import urllib.request
          from urllib.error import HTTPError

          # 1. Configuration & Environment Check
          api_key = os.environ.get('GEMINI_API_KEY', '').strip()
          webhook_url = os.environ.get('SLACK_WEBHOOK_URL', '').strip()

          if not api_key or not webhook_url:
              print("❌ Error: GEMINI_API_KEY or SLACK_WEBHOOK_URL is missing in GitHub Secrets.")
              exit(1)

          model = "gemini-3.1-flash-lite-preview"
          url = f"https://generativelanguage.googleapis.com/v1beta/models/{model}:generateContent"
          prompt = "Bạn là chuyên gia AWS SAP-C02. Tạo 1 câu hỏi trắc nghiệm tiếng Việt về .NET/AWS. Trả về DUY NHẤT JSON chuẩn Slack Block Kit gồm: header, section scenario, section options, divider, context. Không giải thích thêm."

          # 2. Call Gemini API
          data = {"contents": [{"parts": [{"text": prompt}]}]}
          headers = {
              'Content-Type': 'application/json',
              'x-goog-api-key': api_key
          }
          
          try:
              req = urllib.request.Request(url, data=json.dumps(data).encode('utf-8'), headers=headers)
              with urllib.request.urlopen(req) as response:
                  res_data = json.loads(response.read().decode())
                  
                  # Extract and clean JSON
                  raw_text = res_data['candidates'][0]['content']['parts'][0]['text']
                  clean_json = raw_text.strip().replace('```json', '').replace('```', '').strip()
                  parsed_ai_data = json.loads(clean_json)
                  
                  # Handle varying AI JSON responses safely
                  if isinstance(parsed_ai_data, dict) and "blocks" in parsed_ai_data:
                      final_blocks = parsed_ai_data["blocks"]
                  elif isinstance(parsed_ai_data, list):
                      final_blocks = parsed_ai_data
                  else:
                      final_blocks = [parsed_ai_data]
                      
          except HTTPError as e:
              print(f"❌ Gemini API Error: HTTP {e.code} - {e.reason}")
              print(f"Details: {e.read().decode()}")
              exit(1)
          except Exception as e:
              print(f"❌ Data processing error: {str(e)}")
              # Print the raw text to see what the AI actually returned if JSON parsing fails
              if 'raw_text' in locals(): print(f"Raw AI Output: {raw_text}") 
              exit(1)

          # 3. Send to Slack
          # Using top-level 'blocks' instead of 'attachments'
          slack_data = {
              "blocks": final_blocks
          }
          
          try:
              slack_req = urllib.request.Request(webhook_url, data=json.dumps(slack_data).encode('utf-8'), headers={'Content-Type': 'application/json'})
              urllib.request.urlopen(slack_req)
              print("✅ Successfully sent quiz to Slack!")
          except HTTPError as e:
              print(f"❌ Slack Webhook Error: HTTP {e.code} - {e.reason}")
              print(f"Details: {e.read().decode()}")
              exit(1)
          except Exception as e:
              print(f"❌ Slack sending error: {str(e)}")
              exit(1)
